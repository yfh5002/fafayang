buildscript {
    repositories {
        // 腾讯镜像（放在最前面）
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/gradle-plugins/' }
        
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.2.0'
    }
}

allprojects {
    repositories {
        // 腾讯镜像（放在最前面）
        maven { url 'https://mirrors.cloud.tencent.com/nexus/repository/maven-public/' }
        
        google()
        mavenCentral()
    }
}