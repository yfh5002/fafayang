version: "3.8"

services:
  hjsystem:
    build: .
    container_name: hjsystem
    restart: unless-stopped
    ports:
      - "5002:5002"
    volumes:
      # 数据持久化（必须挂载，否则容器重启后数据丢失）
      - ./data:/app/data
      - ./logs:/app/logs
      - ./exports:/app/exports
      - ./temp:/app/temp
      # 证书持久化（首次启动自动生成，后续复用）
      - ./certs:/app/certs
    environment:
      - TZ=Asia/Shanghai
    networks:
      - hjsystem-net

networks:
  hjsystem-net:
    driver: bridge
